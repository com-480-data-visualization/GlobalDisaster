<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Global Natural Disasters</title>

    <!-- Mapbox -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>

    <!--Excel reader  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="map"></div>

    <div id="controls">
        <button id="btn-globe" onclick="toggleGlobe()">Disasters on Globe</button>
        <button id="btn-country" onclick="toggleCountry()">Disasters in Countries</button>
    </div>

    <div id="panel" class="panel hidden">
        <div id="top20-container"></div>
        <div class="panel-header">
        <button class="close-btn" onclick="closePanel()">✕</button>
        <h2 id="country-name">Country</h2>
        <img id="country-flag" src="" alt="flag">
        </div>
        <div id="chart-container"></div>
    </div>

    <script src="config.js"></script>
    <script src="data.js"></script> 
    <script src="main.js"></script>
</body>
</html>
